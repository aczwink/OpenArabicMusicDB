name: انا عم بحلم
form: song
composer: nur_almallah
songWriter: ilia_abu_shadid
singers: [majida_alrumi]
dialect: eg #from ChatGPT
maqamat:
  - maqam: kurdi
    explanation: ""
rhythms:
  - explanation: The primary rhythm
    rhythm: maqsum
  - explanation: During second half of intro and refrain
    rhythm: karatshi
  - explanation: During second half of verse
    rhythm: haja3
attachments:
  - type: public
    comment: Sheet music on C
    contentType: text/x-lilypond
    uri: ./sheet-music.ly
text: ""
lyrics: |
  انا عم بحلم
  ليل نهار بالوردة المليانة زرار
  تقطف باقة تشم وراقا
  ويسكر بالعطر المشوار
  أنا عم بحلم

  عم بحلم انّك جاي بزورق نجمة مضوّاية
  وصار الزورق يعلا ويغرق بالبحر المالو نهاية
  ولمّا فتحت عيوني صار
  عشطوط عيوني البحّار

  أنا عم بحلم ليليّة انت وغافي بعيني
  نزلت دمعة دابت شمعة واحترقت فيك وفي
  وصرنا نطفي النّار
  وما عدنا عرفنا شو صار