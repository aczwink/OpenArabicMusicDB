text: ""
lyrics: |
  تك تك تك يا ام سليمان
  تك تك تك جوزك وين كان؟
  تك تك تك كان بالحقلة
  عم يقطف خوخ ورمّان

  يا ستّي يا ستّ بدور
  شوفي القمر كيف بيدور
  والناطورة بدّا شمس
  و الشمس بعقد المرجان

  عمّي يا عمّي الحطّاب
  خلّينا نلعب عالباب
  والجارة بدّا قمحة
  والقمحة عند الطحّان

  يا جدّي يا جدّ التلج
  لحيتك غطّت عالمرج
  والهوا بدّو خيمة
  والخيمة بدّا خيطان

  ويننّي الجمال؟.. يحنّي بالقنطرة
  شو طعميناهن؟.. قمح ودرة
  شو سقيناهن؟.. ميي مقطّرة
  يا عمّي الغراب.. جوّزني بنتك