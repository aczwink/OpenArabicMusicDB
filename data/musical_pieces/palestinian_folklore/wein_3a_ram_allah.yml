lyrics: |
  وين ع رام الله
  ولفي يا مسافر .. وين ع رام الله
  ما تخاف من الله
  سرقت قليبي .. ما تخاف من الله

  وين ياحبيبي
  رايح تاركني وين ياحبيبي
  حظي ونصيبي
  حبك من الله .. حظي ونصيبي

  عالعود اليابس
  نرفع علمنا .. عالعود اليابس
  من غزه لنابلس
  هذا وطننا من غزه لنابلس

  وين ع الخليلي
  رايح تاركني وين ع الخليلي
  بنت الاصيلي
  ياريتك تعرف .. بنت الاصيلي

  وين ع جنيني
  تاركني ورايح وين ع جنيني
  شوقي وحنيني
  باين في قليبي شوقي وحنيني