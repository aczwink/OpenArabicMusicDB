lyrics: |
  عالمايا عالمايا عالعين يا ملايا
  يا بنية بالله اسقيني عطشان اسقيني مايا

  يا ويل ويلي طولها
  رمح الرديني طولها
  و اللي يحاول يطولها
  لذوقه المنايا

  يا ويل ويلي عيونها
  عيون المها يا عيونها
  و إن ذبلتلي جفونها
  تدغدغلي الحنايا

  يا ويا ويلي منها
  هالشاغلتني بسرها
  و الله لاتبع أثرها
  مهما تكون النهاية