lyrics: |
  مريم مريمتي و عيني مريما
  و القلب مجروح بده مرهما
  يا عيني بده مريما
  
  مريم يا دلي
  والشعر متدلي
  و عسكر العثمانلي
  خطفو مرياما
  يا ويلي خطفو مرياما

  لبست البنّي
  وقلعت البنّي
  قصدا تجننّي والله مرياما
  يا عينوني عيني مرياما

  مريم علسطوح والشعر عمبلوح  
  والقلب مجروح بدو مرهما
  يا عيني بده مرهما

  ولأعزفلك عالعود يم عيون السود
  ولخلي البارود يوصل للسما
  يا مريم يوصل للسما